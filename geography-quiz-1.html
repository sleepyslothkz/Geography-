<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuiz — World Capitals</title>

<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: #dde2f0;
    --text: #1a1d2e;
    --muted: #8a90a8;
    --accent: #4a6ff5;
    --accent2: #7c5cf5;
    --green: #16a34a;
    --green-bg: rgba(22,163,74,0.10);
    --red: #dc2626;
    --red-bg: rgba(220,38,38,0.09);
    --gold: #d97706;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(74,111,245,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(124,92,245,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }

  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Reset button */
  .btn-reset {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 7px 13px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-reset:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-bg);
  }

  /* Best score banner */
  .best-banner {
    display: none;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
  .best-banner span { color: var(--gold); font-weight: 600; }
  .best-banner.show { display: block; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    justify-content: space-between;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 10px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(74,111,245,0.04);
  }

  .stat-value {
    font-size: 20px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-value.correct { color: var(--green); }
  .stat-value.wrong   { color: var(--red); }
  .stat-value.round   { color: var(--gold); }
  .stat-value.progress{ color: var(--accent); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Question card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 24px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(74,111,245,0.06);
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(74,111,245,0.25), transparent);
  }

  .question-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 18px;
  }

  .capital-display {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .capital-icon {
    width: 52px;
    height: 52px;
    background: var(--surface2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .capital-text { flex: 1; }

  .capital-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  .capital-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Answers grid */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .answer-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 15px 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    user-select: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .answer-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(74,111,245,0.06), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .answer-btn:hover:not(:disabled)::before { opacity: 1; }
  .answer-btn:hover:not(:disabled) {
    border-color: rgba(74,111,245,0.45);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(74,111,245,0.10);
  }

  .answer-btn:active:not(:disabled) { transform: translateY(0); }
  .answer-btn:disabled { cursor: default; }

  .answer-flag { font-size: 22px; line-height: 1; flex-shrink: 0; }

  .answer-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  /* States */
  .answer-btn.correct {
    background: var(--green-bg);
    border-color: var(--green);
    box-shadow: 0 0 18px rgba(22,163,74,0.13);
  }
  .answer-btn.correct .answer-name { color: var(--green); }

  .answer-btn.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    box-shadow: 0 0 18px rgba(220,38,38,0.12);
  }
  .answer-btn.wrong .answer-name { color: var(--red); }

  .answer-btn.dimmed { opacity: 0.3; }

  /* Streak badge */
  .streak-badge {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--surface);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(217,119,6,0.15);
    animation: fadeInRight 0.3s ease;
  }

  /* Round complete overlay */
  .round-complete {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(244,246,251,0.93);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
  }

  .round-complete.show { display: flex; }

  .round-emoji {
    font-size: 64px;
    margin-bottom: 16px;
    animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  .round-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--gold), #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .round-score    { font-size: 16px; color: var(--muted); margin-bottom: 6px; }
  .round-accuracy { font-size: 32px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .round-best     { font-size: 13px; color: var(--gold); margin-bottom: 28px; font-weight: 500; }

  .round-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .btn-next-round {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    padding: 15px 36px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(74,111,245,0.30);
  }
  .btn-next-round:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(74,111,245,0.38);
  }

  .btn-reset-round {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 15px 24px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset-round:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* Animations */
  @keyframes fadeInRight {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes bounceIn {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s ease; }

  @keyframes pulse-correct {
    0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.35); }
    70%  { box-shadow: 0 0 0 10px rgba(22,163,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
  }
  .pulse-correct { animation: pulse-correct 0.5s ease; }

  /* Confirm dialog */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(244,246,251,0.88);
    backdrop-filter: blur(6px);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(74,111,245,0.10);
  }
  .confirm-box h3 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--text);
  }
  .confirm-box p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  .confirm-yes {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 24px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .confirm-yes:hover { opacity: 0.88; }
  .confirm-no {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 24px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .confirm-no:hover { border-color: var(--accent); }

  @media (max-width: 400px) {
    .answers { grid-template-columns: 1fr; }
    .card { padding: 22px 16px 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">GeoQuiz</div>
    <div class="subtitle">World Capitals Challenge</div>
    <button class="btn-reset" onclick="confirmReset()">↺ Reset</button>
  </div>

  <div class="best-banner" id="best-banner">
    🏅 Best accuracy: <span id="best-value">—</span>

  </div>

  <div class="card">

  </div>

  <div class="answers" id="answers"></div>
</div>

<div class="streak-badge" id="streak-badge">🔥 <span id="streak-count">0</span> streak!</div>

<!-- Round complete overlay -->
<div class="round-complete" id="round-complete">

  <div class="round-title" id="round-title">Round Complete!</div>
  <div class="round-score" id="round-score"></div>
  <div class="round-accuracy" id="round-accuracy"></div>
  <div class="round-best" id="round-best"></div>
  <div class="round-buttons">
    <button class="btn-next-round" onclick="startNextRound()">Next Round →</button>
    <button class="btn-reset-round" onclick="confirmReset()">↺ Reset All</button>
  </div>
</div>

<!-- Confirm reset dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Reset Game?</h3>
    <p>All progress, scores and records will be cleared. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="doReset()">Yes, Reset</button>
      <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

// WEB AUDIO — sound effects
// ═══════════════════════════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrect() {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.10);
      gain.gain.linearRampToValueAtTime(0.18, t + i * 0.10 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.10 + 0.22);
      osc.start(t + i * 0.10);
      osc.stop(t + i * 0.10 + 0.25);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    [220, 196].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.12, t + i * 0.13);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.13 + 0.18);
      osc.start(t + i * 0.13);
      osc.stop(t + i * 0.13 + 0.20);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// LOCALSTORAGE — save / load / clear
// ═══════════════════════════════════════════════════════════════
const SAVE_KEY = 'geoquiz_save_v1';
const BEST_KEY = 'geoquiz_best_v1';

function saveState() {
  const state = { queue, queuePos, roundNum, totalCorrect, totalWrong,
                  roundCorrect, roundWrong, streak };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    queue        = s.queue;
    queuePos     = s.queuePos;
    roundNum     = s.roundNum;
    totalCorrect = s.totalCorrect;
    totalWrong   = s.totalWrong;
    roundCorrect = s.roundCorrect;
    roundWrong   = s.roundWrong;
    streak       = s.streak;
    return true;
  } catch(e) { return false; }
}

function clearState() {
  localStorage.removeItem(SAVE_KEY);
  localStorage.removeItem(BEST_KEY);
}

function getBestAccuracy() {
  return parseFloat(localStorage.getItem(BEST_KEY) || '0');
}

function tryUpdateBest(pct) {
  const prev = getBestAccuracy();
  if (pct > prev) {
    localStorage.setItem(BEST_KEY, pct.toString());
    return true;
  }
  return false;
}

function showBestBanner() {
  const best = getBestAccuracy();
  const banner = document.getElementById('best-banner');
  if (best > 0) {
    document.getElementById('best-value').textContent = best + '%';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
let queue        = [];
let queuePos     = 0;
let roundNum     = 1;
let totalCorrect = 0;
let totalWrong   = 0;
let roundCorrect = 0;
let roundWrong   = 0;
let streak       = 0;
let locked       = false;
let streakTimer  = null;

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  queue = shuffle([...Array(COUNTRIES.length).keys()]);
  queuePos = 0;
}

// ═══════════════════════════════════════════════════════════════
// SMART DISTRACTORS
// ═══════════════════════════════════════════════════════════════
function getDistractors(correctIdx, count = 3) {
  const correct = COUNTRIES[correctIdx];
  const sameRegion  = COUNTRIES.map((c,i)=>({c,i})).filter(({c,i})=> i!==correctIdx && c.region===correct.region);
  const otherRegion = COUNTRIES.map((c,i)=>({c,i})).filter(({c,i})=> i!==correctIdx && c.region!==correct.region);
  const pool = [...shuffle(sameRegion), ...shuffle(otherRegion)];
  return pool.slice(0, count).map(({i}) => i);
}

// ═══════════════════════════════════════════════════════════════
// UI UPDATERS
// ═══════════════════════════════════════════════════════════════
function updateStats() {
  document.getElementById('stat-correct').textContent  = totalCorrect;
  document.getElementById('stat-wrong').textContent    = totalWrong;
  document.getElementById('stat-round').textContent    = roundNum;
  document.getElementById('stat-progress').textContent = `${queuePos} / ${COUNTRIES.length}`;
  const pct = (queuePos / COUNTRIES.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showStreak(n) {
  if (n < 3) return;
  const badge = document.getElementById('streak-badge');
  document.getElementById('streak-count').textContent = n;
  badge.style.display = 'block';
  clearTimeout(streakTimer);
  streakTimer = setTimeout(() => { badge.style.display = 'none'; }, 2000);
}

// ═══════════════════════════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════════════════════════
function renderQuestion() {
  if (queuePos >= COUNTRIES.length) {
    showRoundComplete();
    return;
  }

  locked = false;
  const idx = queue[queuePos];
  const country = COUNTRIES[idx];

  document.getElementById('capital-flag').textContent = '🏛️';
  document.getElementById('capital-name').textContent = country.capital;

  const distractorIdxs = getDistractors(idx, 3);
  const optionIdxs = shuffle([idx, ...distractorIdxs]);

  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';

  optionIdxs.forEach(optIdx => {
    const c = COUNTRIES[optIdx];
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.dataset.idx = optIdx;
    btn.innerHTML = `<span class="answer-flag">${c.flag}</span><span class="answer-name">${c.name}</span>`;
    btn.addEventListener('click', () => handleAnswer(btn, optIdx, idx));
    answersEl.appendChild(btn);
  });

  updateStats();
  saveState();
}

// ═══════════════════════════════════════════════════════════════
// HANDLE ANSWER
// ═══════════════════════════════════════════════════════════════
function handleAnswer(btn, chosenIdx, correctIdx) {
  if (locked) return;
  locked = true;

  const isCorrect = chosenIdx === correctIdx;
  const allBtns = document.querySelectorAll('.answer-btn');

  if (isCorrect) {
    btn.classList.add('correct', 'pulse-correct');
    playCorrect();
    totalCorrect++;
    roundCorrect++;
    streak++;
    showStreak(streak);
    allBtns.forEach(b => { if (b !== btn) b.classList.add('dimmed'); });
  } else {
    btn.classList.add('wrong', 'shake');
    playWrong();
    totalWrong++;
    roundWrong++;
    streak = 0;
    document.getElementById('streak-badge').style.display = 'none';
    allBtns.forEach(b => {
      if (parseInt(b.dataset.idx) === correctIdx) b.classList.add('correct');
      else if (b !== btn) b.classList.add('dimmed');
    });
  }

  allBtns.forEach(b => b.disabled = true);
  queuePos++;
  updateStats();
  saveState();

  setTimeout(renderQuestion, 900);
}

// ═══════════════════════════════════════════════════════════════
// ROUND COMPLETE
// ═══════════════════════════════════════════════════════════════
function showRoundComplete() {
  const total = roundCorrect + roundWrong;
  const pct = total > 0 ? Math.round((roundCorrect / total) * 100) : 0;

  let emoji = '🌍';
  if      (pct === 100) emoji = '🏆';
  else if (pct >= 80)   emoji = '🌟';
  else if (pct >= 60)   emoji = '👏';
  else if (pct >= 40)   emoji = '📚';
  else                  emoji = '🗺️';

  const isNewBest = tryUpdateBest(pct);

  document.getElementById('round-emoji').textContent    = emoji;
  document.getElementById('round-title').textContent    = `Round ${roundNum} Done!`;
  document.getElementById('round-score').textContent    = `${roundCorrect} correct · ${roundWrong} wrong`;
  document.getElementById('round-accuracy').textContent = `${pct}% accuracy`;
  document.getElementById('round-best').textContent     = isNewBest ? '🏅 New best record!' : `Best: ${getBestAccuracy()}%`;
  document.getElementById('round-complete').classList.add('show');
  showBestBanner();
}

function startNextRound() {
  roundNum++;
  roundCorrect = 0;
  roundWrong   = 0;
  document.getElementById('round-complete').classList.remove('show');
  buildQueue();
  updateStats();
  saveState();
  renderQuestion();
}

// ═══════════════════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════════════════
function confirmReset() {
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

function doReset() {
  clearState();
  queue        = [];
  queuePos     = 0;
  roundNum     = 1;
  totalCorrect = 0;
  totalWrong   = 0;
  roundCorrect = 0;
  roundWrong   = 0;
  streak       = 0;
  locked       = false;
  document.getElementById('round-complete').classList.remove('show');
  document.getElementById('streak-badge').style.display = 'none';
  closeConfirm();
  showBestBanner();
  buildQueue();
  updateStats();
  renderQuestion();
}

// ═══════════════════════════════════════════════════════════════
// INIT — restore or fresh start
// ═══════════════════════════════════════════════════════════════
if (loadState()) {
  updateStats();
  showBestBanner();
  renderQuestion();
} else {
  buildQueue();
  updateStats();
  showBestBanner();
  renderQuestion();
}

// Save on page hide (browser close / tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveState();
});
window.addEventListener('pagehide', saveState);
